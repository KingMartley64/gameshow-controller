<!DOCTYPE html>
<html>
<head>
  <title>Game Show Controller</title>
  <style>
    body { font-family: Arial; text-align: center; }
    button {
      font-size: 20px;
      margin: 10px;
      padding: 20px;
      width: 200px;
    }
  </style>
</head>

<body>
  <h1>🎮 Game Show Control</h1>

  <button onclick="send('REVEAL')">Reveal</button>
  <button onclick="send('LOCK')">Lock</button>
  <button onclick="send('NEXT')">Next</button>

  <script>
    const SERVER = "https://gameshow-server-q2if.onrender.com";

    function send(command) {
      fetch(SERVER + "/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ command })
      });
    }
  </script>
</body>
</html>
