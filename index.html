<!DOCTYPE html>
<html>

<head>
    <title>Game Show Controller</title>
</head>

<body>
    <h1 style="text-align: center;"><span style="font-family: 'Times New Roman', Times, serif;">STUDIO 64 TEST</span></h1>
    <p><button onclick="send('REVEAL')">Reveal</button><button onclick="send('LOCK')">Lock</button><button onclick="send('NEXT')">Next</button></p>
    <script>
        const SERVER = "https://gameshow-server-q2if.onrender.com";
        
        function send(command) {
          fetch(SERVER + "/send", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ command })
          });
        }
    </script>
</body>

</html>
